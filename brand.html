<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="עמוד יצרן ב-Car2Buy — כל הדגמים, המחירים וההחזר החודשי של המותג במקום אחד. מצאו את הרכב המתאים לכם.">
<title>יצרן · Car2Buy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  /* ===== brand hero ===== */
  .brand-hero { background: var(--bg-1); border-bottom: 1px solid var(--line-2); padding: var(--nav-off) 0 44px; }
  .brand-crumb { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .brand-crumb a { color: var(--muted); }
  .brand-crumb a:hover { color: var(--gold); }
  .brand-crumb b { color: var(--ink); font-weight: 700; }
  .brand-head { text-align: center; margin-top: 26px; position: relative; }
  .brand-logo-big { width: 78px; height: 78px; margin: 0 auto 14px; display: grid; place-items: center; }
  .brand-logo-big img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .brand-title { font-size: clamp(38px, 6vw, 64px); font-weight: 900; letter-spacing: -0.01em; color: var(--ink); }
  .brand-count { margin-top: 12px; font-size: 15px; color: var(--muted); font-weight: 600; }
  .brand-back { position: absolute; inset-inline-end: 0; top: 50%; transform: translateY(-50%); background: #fff; border: 1px solid var(--line); border-radius: 999px; padding: 10px 20px; font-size: 14px; font-weight: 600; color: var(--ink); transition: .25s; }
  .brand-back:hover { border-color: var(--gold-line); color: var(--gold-deep); }
  @media (max-width: 760px) { .brand-back { position: static; transform: none; display: inline-block; margin-top: 16px; } }

  .brand-grid-sec { padding-top: clamp(36px, 5vw, 60px); }
  .brand-grid { grid-template-columns: repeat(4, 1fr); margin-top: 0; }
  @media (max-width: 1080px) { .brand-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 760px) { .brand-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 460px) { .brand-grid { grid-template-columns: 1fr; } }

  /* ===== brand content ===== */
  .cd-section-k { font-family: var(--mono, monospace); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); font-weight: 600; }
  .brand-content-h { font-size: clamp(26px, 3.4vw, 40px); margin: 8px 0 22px; color: var(--ink); }
  .brand-content h3 { font-size: clamp(20px, 2.4vw, 26px); margin-top: 34px; color: var(--ink); }
  .brand-content p { color: var(--ink-soft); font-size: 16.5px; line-height: 1.9; margin-top: 14px; }
  .brand-content p b { color: var(--ink); }

  /* ===== video band ===== */
  .brand-video { position: relative; overflow: hidden; padding: clamp(70px, 11vw, 140px) 0; text-align: center; }
  .bv-bg { position: absolute; inset: 0; background-image: url("https://images.pexels.com/photos/3802510/pexels-photo-3802510.jpeg?auto=compress&cs=tinysrgb&w=2000"); background-size: cover; background-position: center; transform: scale(1.04); }
  .bv-ov { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,10,12,.62), rgba(10,10,12,.78)); }
  .bv-inner { position: relative; z-index: 2; color: #fff; }
  .bv-k { font-family: var(--mono, monospace); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); font-weight: 700; }
  .bv-title { font-size: clamp(30px, 5vw, 54px); font-weight: 900; margin-top: 8px; color: #fff; }
  .bv-sub { max-width: 560px; margin: 14px auto 0; color: rgba(255,255,255,.82); font-size: 16px; line-height: 1.7; }
  .bv-play { width: 82px; height: 82px; margin: 32px auto 0; border-radius: 50%; border: 0; cursor: pointer; display: grid; place-items: center; background: var(--gold); color: #1a1305; box-shadow: 0 20px 50px -18px rgba(0,0,0,.7); transition: transform .25s; }
  .bv-play svg { width: 34px; height: 34px; margin-inline-start: 3px; }
  .bv-play:hover { transform: scale(1.08); }

  .bv-pop { position: fixed; inset: 0; z-index: 240; display: none; }
  .bv-pop.open { display: block; }
  .bv-pop-ov { position: absolute; inset: 0; background: rgba(0,0,0,.85); backdrop-filter: blur(3px); }
  .bv-pop-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: min(960px, calc(100vw - 40px)); aspect-ratio: 16/9; background: #000; border-radius: 14px; overflow: hidden; box-shadow: 0 40px 90px -30px rgba(0,0,0,.8); }
  .bv-pop-frame { width: 100%; height: 100%; }
  .bv-pop-frame iframe { width: 100%; height: 100%; border: 0; display: block; }
  .bv-pop-x { position: absolute; top: -46px; inset-inline-end: 0; width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.34); color: #fff; font-size: 15px; cursor: pointer; }
  .bv-pop-x:hover { background: rgba(255,255,255,.28); }

  /* ===== articles ===== */
  .brand-art-h { text-align: center; font-size: clamp(26px, 3.6vw, 42px); margin: 6px 0 clamp(28px, 4vw, 44px); color: var(--ink); }
  .brand-articles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  @media (max-width: 900px) { .brand-articles { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .brand-articles { grid-template-columns: 1fr; } }
  .ba-card { display: flex; flex-direction: column; background: var(--bg-card); border: 1px solid var(--line-2); border-radius: 16px; overflow: hidden; color: inherit; transition: .35s var(--ease); }
  .ba-card:hover { transform: translateY(-5px); border-color: var(--gold-line); box-shadow: 0 26px 54px -40px rgba(0,0,0,.4); }
  .ba-ph { aspect-ratio: 16/10; background: #fff; overflow: hidden; }
  .ba-ph img { width: 100%; height: 100%; object-fit: contain; padding: 12px; transition: transform .5s var(--ease); }
  .ba-card:hover .ba-ph img { transform: scale(1.05); }
  .ba-body { padding: 18px 20px 20px; display: flex; flex-direction: column; gap: 8px; }
  .ba-tag { align-self: flex-start; font-size: 11px; font-weight: 700; letter-spacing: .04em; color: var(--gold-deep); background: color-mix(in oklab, var(--gold) 12%, transparent); border-radius: 999px; padding: 4px 12px; }
  .ba-body h4 { font-size: 18px; line-height: 1.35; color: var(--ink); }
  .ba-body p { font-size: 14px; color: var(--muted); line-height: 1.65; }
  .ba-more { margin-top: auto; font-size: 14px; font-weight: 600; color: var(--gold-deep); }

  .reveal { opacity: 0; transform: translateY(18px); transition: opacity .6s var(--ease), transform .6s var(--ease); }
  .reveal.in { opacity: 1; transform: none; }
</style>
</head>
<body data-page="models">
<div id="site-header"></div>

<main id="brandPage"></main>

<div id="site-footer"></div>

<script src="models-data.js"></script>
<script src="cars-data.js"></script>
<script src="loan-cars.js"></script>
<script src="car-videos.js"></script>
<script src="customers-data.js"></script>
<script src="brand-content.js"></script>
<script src="brand-articles.js"></script>
<script src="site.js"></script>
<script src="brand.js"></script>
<script src="app.js"></script>

</body>
</html>
