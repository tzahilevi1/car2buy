<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<body data-page="magazine">
<div id="site-header"></div>

<main>
  <section class="media-hero page">
    <div class="mh-bg"><img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=2000&q=80&auto=format&fit=crop" alt="מגזין"></div>
    <div class="mh-overlay"></div>
    <div class="wrap"><div class="mh-content">
      <span class="eyebrow reveal">מגזין Car2Buy</span>
      <h1 class="reveal">כל מה שכדאי <span class="gold-text">לדעת לפני שנוסעים</span></h1>
      <p class="lead reveal">מדריכים, טיפים ותובנות על ליסינג מימוני, מימון רכב וטריד-אין — בשפה פשוטה.</p>
    </div></div>
  </section>

  <section class="section">
    <div class="wrap">
      <div class="mag-layout">
        <div class="mag-main">
          <div class="mag-filter" id="magFilter"></div>
          <div id="magFeatured"></div>
          <h2 class="mag-grid-h">כל הכתבות</h2>
          <div class="posts" id="magGrid"></div>
        </div>
        <aside class="mag-side">
          <div class="mag-widget">
            <div class="mag-w-h">חיפוש במגזין</div>
            <input type="search" id="magSearch" class="mag-search" placeholder="נושא, דגם או מילת מפתח…" autocomplete="off">
          </div>
          <div class="mag-widget">
            <div class="mag-w-h">קטגוריות</div>
            <div class="mag-cats" id="magCats"></div>
          </div>
          <div class="mag-widget">
            <div class="mag-w-h">הנקראות ביותר</div>
            <div class="mag-popular" id="magPopular"></div>
          </div>
          <div class="mag-widget mag-news">
            <div class="mag-w-h">הצטרפו לניוזלטר</div>
            <p class="mag-news-p">טיפים ומדריכים על ליסינג ומימון רכב, ישר למייל.</p>
            <form class="mag-news-form" id="magNews">
              <input type="email" placeholder="כתובת אימייל" required>
              <button type="submit" class="btn btn-gold">הרשמה</button>
              <div class="mag-news-ok" id="magNewsOk">✓ תודה! נרשמתם בהצלחה.</div>
            </form>
          </div>
        </aside>
      </div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="models-data.js"></script>
