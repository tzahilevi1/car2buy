<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Car2Buy · חתימה על הסכם</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--brand:#F5691E;--brand-deep:#D14E0C;--line:#e5e7eb;--muted:#6b7280;--ok:#16a34a;--danger:#e2555a}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Heebo",Arial,sans-serif;background:#f4f5f7;color:#1c2430;padding:16px}
  .wrap{max-width:760px;margin:0 auto}
  .card{background:#fff;border-radius:16px;padding:22px;box-shadow:0 4px 20px rgba(16,24,40,.08);margin-bottom:16px}
  h1{color:var(--brand);margin:0 0 4px;font-size:22px;text-align:center}
  .sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:6px}
  h3{color:var(--brand);margin:18px 0 8px;font-size:16px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  td{padding:7px 6px;border-bottom:1px solid #eee}
  td.k{color:var(--muted)}td.v{text-align:left;font-weight:700}
  .note{font-size:12px;color:#888;margin-top:14px;line-height:1.6}
  canvas{border:2px dashed var(--line);border-radius:12px;background:#fff;touch-action:none;width:100%;max-width:520px;height:170px;display:block}
  .btn{background:var(--brand);color:#fff;border:none;border-radius:12px;padding:13px 22px;font-weight:800;font-size:16px;cursor:pointer;font-family:inherit}
  .btn:hover{background:var(--brand-deep)}
  .btn:disabled{opacity:.6}
  .ghost{background:#f0f1f4;color:#1c2430;border:1px solid var(--line)}
  .msg{margin-top:12px;font-size:14px;min-height:18px}
  .msg.err{color:var(--danger)}.msg.ok{color:var(--ok);font-weight:700}
  .big-ok{text-align:center;padding:30px}.big-ok .em{font-size:56px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card"><h1>Car<span style="color:#1c2430">2</span>Buy</h1><div class="sub">הסכם הזמנת רכב — חתימה דיגיטלית</div></div>
  <div id="content"><div class="card" style="text-align:center;color:var(--muted)">טוען…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js" integrity="sha384-0w2KAL2YHP6wKOkUDzkCDGgVvfmHnj02DHeQ6XcHOgTfFsGyonKOpShMH1x6nk9o" crossorigin="anonymous"></script>
<script>
(function () {
  var db = window.supabase.createClient(
    'https://tdxhqpauuqawcoivjnnm.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkeGhxcGF1dXFhd2NvaXZqbm5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NTE4MjgsImV4cCI6MjA5OTQyNzgyOH0.bKtres24IyE4IjyZ4h9y9Wtyhgacqw37ya5s9vNDltI'
  );
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function nis(n){return n==null||n===''?'—':'₪'+Number(n).toLocaleString('en-US');}
  var q=new URLSearchParams(location.search), D=q.get('d'), T=q.get('t');
  var content=document.getElementById('content');
  function fail(t){content.innerHTML='<div class="card big-ok"><div class="em">🔗</div><h3 style="justify-content:center">'+esc(t)+'</h3></div>';}

  if(!D||!T){fail('קישור לא תקין.');return;}
  db.rpc('get_contract',{p_deal:D,p_token:T}).then(function(r){
    if(r.error||!r.data||!r.data.ok){fail('הקישור אינו תקין או שפג תוקפו.');return;}
    var d=r.data;
    if(d.signed){content.innerHTML='<div class="card big-ok"><div class="em">✅</div><h3 style="justify-content:center;color:var(--ok)">ההסכם כבר נחתם</h3><p class="sub">תודה!</p></div>';return;}
    render(d);
  });

  function row(k,v){return '<tr><td class="k">'+k+'</td><td class="v">'+v+'</td></tr>';}
  function render(d){
    var today=new Date().toLocaleDateString('he-IL');
    content.innerHTML=
      '<div class="card" id="doc">'+
        '<div class="sub">מספר הזמנה: '+esc(d.order_no||'—')+' · תאריך: '+today+'</div>'+
        '<h3>פרטי הלקוח</h3><table>'+row('שם',esc(d.client_name))+row('ת.ז / ח.פ',esc(d.client_id))+row('טלפון',esc(d.client_phone))+row('דוא"ל',esc(d.client_email))+row('כתובת',esc(d.client_address))+'</table>'+
        '<h3>פרטי הרכב</h3><table>'+row('יצרן ודגם',esc(((d.car_make||'')+' '+(d.car_model||'')).trim())+' '+esc(d.car_trim||''))+row('שנה',esc(d.car_year||''))+row('צבע',esc(d.car_color||''))+row('מנוע',esc(d.car_engine||''))+row('תיבת הילוכים',esc(d.car_gearbox||''))+'</table>'+
        '<h3>תנאי העסקה</h3><table>'+row('מחיר הרכב',nis(d.car_price))+row('מקדמה כוללת',nis(d.down_total))+row('החזר חודשי משוער',nis(d.monthly))+row('זמן אספקה משוער',(d.delivery_days||'—')+' ימים')+row('סכום כולל',nis(d.total))+row('יתרה לתשלום',nis(d.balance_to_pay))+'</table>'+
        (d.spec?'<h3>מפרט והערות</h3><p>'+esc(d.spec)+'</p>':'')+
        '<p class="note">ההחזר החודשי משוער בלבד וכפוף לאישור גוף מימון, נתוני הלקוח וזמינות הרכב במלאי. חתימת הלקוח מהווה אישור להזמנה בכפוף לתנאים.</p>'+
      '</div>'+
      '<div class="card"><h3>חתימת הלקוח</h3><p class="sub" style="text-align:right;margin-bottom:8px">חתמו באזור הלבן (עכבר / אצבע):</p>'+
        '<canvas id="sig"></canvas>'+
        '<div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn" id="doSign">✍ אני מאשר/ת וחותם/ת</button><button class="btn ghost" id="clr">נקה</button></div>'+
        '<div class="msg" id="msg"></div></div>';
    setupCanvas();
  }

  function setupCanvas(){
    var cv=document.getElementById('sig');
    // size the canvas to its rendered width for crisp lines
    var rect=cv.getBoundingClientRect(); cv.width=rect.width; cv.height=170;
    var ctx=cv.getContext('2d'); ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.strokeStyle='#111';
    var drawing=false, has=false;
    function pos(e){var r=cv.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return {x:t.clientX-r.left,y:t.clientY-r.top};}
    function start(e){drawing=true;has=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);if(e.cancelable)e.preventDefault();}
    function move(e){if(!drawing)return;var p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();if(e.cancelable)e.preventDefault();}
    function end(){drawing=false;}
    cv.addEventListener('mousedown',start);cv.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
    cv.addEventListener('touchstart',start);cv.addEventListener('touchmove',move);cv.addEventListener('touchend',end);
    document.getElementById('clr').addEventListener('click',function(){ctx.clearRect(0,0,cv.width,cv.height);has=false;});
    document.getElementById('doSign').addEventListener('click',function(){
      var msg=document.getElementById('msg');
      if(!has){msg.className='msg err';msg.textContent='נא לחתום קודם באזור החתימה.';return;}
      var btn=this;btn.disabled=true;msg.className='msg';msg.textContent='שולח…';
      var sig=cv.toDataURL('image/png');
      db.rpc('submit_signature',{p_deal:D,p_token:T,p_sig:sig}).then(function(r){
        if(r.error||!r.data||!r.data.ok){btn.disabled=false;msg.className='msg err';msg.textContent='שגיאה: '+((r.data&&r.data.error)||(r.error&&r.error.message)||'לא ניתן לשמור');return;}
        content.innerHTML='<div class="card big-ok"><div class="em">✅</div><h3 style="justify-content:center;color:var(--ok)">ההסכם נחתם בהצלחה!</h3><p class="sub">תודה. עותק חתום נשמר במערכת ונציג יחזור אליך.</p></div>';
      });
    });
  }
})();
</script>
</body>
</html>
