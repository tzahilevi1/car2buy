<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Car2Buy · ניהול</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0f12; --panel:#16181d; --panel2:#1d2027; --line:#2a2e37;
    --txt:#eef0f4; --muted:#9aa1ad; --gold:#F5691E; --gold-deep:#D14E0C;
    --ok:#2ec46b; --warn:#f5b642; --danger:#e2555a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Heebo",Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px}
  a{color:var(--gold)}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none!important}

  /* ---------- login ---------- */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:34px 30px;width:100%;max-width:380px}
  .login-card h1{margin:0 0 4px;font-size:22px}
  .login-card p{margin:0 0 22px;color:var(--muted);font-size:14px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .field input{width:100%;padding:11px 12px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-size:15px}
  .field input:focus{outline:none;border-color:var(--gold)}
  .btn{background:var(--gold);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:15px}
  .btn:hover{background:var(--gold-deep)}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .btn-sm{padding:6px 12px;font-size:13px;border-radius:8px}
  .err{color:var(--danger);font-size:13px;margin-top:10px;min-height:16px}

  /* ---------- app shell ---------- */
  header.top{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  header.top .brand{font-weight:800;font-size:18px}
  header.top .brand b{color:var(--gold)}
  header.top .who{color:var(--muted);font-size:13px;margin-inline-end:12px}
  .wrap{max-width:1200px;margin:0 auto;padding:22px}
  nav.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
  nav.tabs button{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:9px 16px;border-radius:10px;font-weight:600}
  nav.tabs button.active{background:var(--gold);color:#fff;border-color:var(--gold)}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
  .stat .k{color:var(--muted);font-size:13px;margin-bottom:6px}
  .stat .v{font-size:28px;font-weight:800}
  .stat .v.gold{color:var(--gold)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:20px}
  .card h3{margin:0 0 14px;font-size:16px}
  .row-between{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:right;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  td.wrap-cell{white-space:normal;max-width:280px}
  tbody tr:hover{background:var(--panel2)}
  .table-scroll{overflow-x:auto}
  .tag{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
  .tag.new{color:var(--gold);border-color:var(--gold)}
  .tag.handled{color:var(--ok);border-color:var(--ok)}
  select,input.inp{padding:8px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--txt);font-size:14px}
  .muted{color:var(--muted)}
  .bar{height:8px;background:var(--panel2);border-radius:6px;overflow:hidden}
  .bar>span{display:block;height:100%;background:var(--gold)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-grid .field{margin:0}
  .loading{color:var(--muted);padding:20px;text-align:center}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login">
  <form class="login-card" id="loginForm">
    <h1>Car<b>2</b>Buy · ניהול</h1>
    <p>כניסת מנהל בלבד</p>
    <div class="field"><label for="email">אימייל</label><input type="email" id="email" autocomplete="username" required></div>
    <div class="field"><label for="password">סיסמה</label><input type="password" id="password" autocomplete="current-password" required></div>
    <button type="submit" class="btn" style="width:100%">התחברות</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<!-- ===== APP ===== -->
<div id="app" class="hidden">
  <header class="top">
    <div class="brand">Car<b>2</b>Buy · ניהול</div>
    <div><span class="who" id="whoami"></span><button class="btn btn-ghost btn-sm" id="logout">יציאה</button></div>
  </header>
  <div class="wrap">
    <nav class="tabs" id="tabs">
      <button data-tab="overview" class="active">סקירה</button>
      <button data-tab="leads">לידים</button>
      <button data-tab="appointments">פגישות</button>
      <button data-tab="analytics">אנליטיקס</button>
      <button data-tab="cars">רכבים</button>
    </nav>
    <section id="view"><div class="loading">טוען…</div></section>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js" integrity="sha384-0w2KAL2YHP6wKOkUDzkCDGgVvfmHnj02DHeQ6XcHOgTfFsGyonKOpShMH1x6nk9o" crossorigin="anonymous"></script>
<script src="admin.js"></script>
</body>
</html>
